app-id: com.github.zipeks.rani
runtime: org.freedesktop.Platform
runtime-version: '25.08' 
sdk: org.freedesktop.Sdk

sdk-extensions:
  - org.freedesktop.Sdk.Extension.rust-stable

build-options:
  append-path: /usr/lib/sdk/rust-stable/bin
  env:
    CARGO_HOME: /run/build/rani/cargo     
    CARGO_NET_OFFLINE: 'true'              

command: rani

finish-args:
  - --share=network                        
  - --share=ipc
  - --talk-name=org.freedesktop.secrets     
  - --talk-name=org.freedesktop.portal.Desktop

modules:
  - name: chafa
    buildsystem: autotools
    sources:
      - type: git
        url: https://github.com/hpjansson/chafa.git
        tag: 1.18.2

  - name: rani
    buildsystem: simple
    build-commands:
      - cargo build --offline --release
      
      - install -Dm755 target/release/rani /app/bin/rani
      - install -Dm644 rani.desktop /app/share/applications/${FLATPAK_ID}.desktop
      - install -Dm644 assets/icon.svg /app/share/icons/hicolor/scalable/apps/${FLATPAK_ID}.svg
      
    sources:
      - type: git
        url: https://github.com/Zipeks/RAni.git
        branch: main

      - cargo-sources.json 
