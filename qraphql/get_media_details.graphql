query GetMediaDetails($mediaId: Int!, $format: ScoreFormat) {
  Media(id: $mediaId) {
    averageScore
    chapters
    coverImage {
      large
    }
    description
    episodes
    mediaListEntry {
      mediaId
      progress
      progressVolumes
      repeat
      status
      score(format: $format)
      startedAt {
        year
        month
        day
      }
      completedAt {
        year
        month
        day
      }
      notes
      id
    }
    season
    seasonYear
    siteUrl
    status
    title {
        romaji
        userPreferred
        english
        native
    }
    type
    volumes
    endDate {
      year
      month
      day
    }
    isFavourite
    startDate {
      year
      month
      day
    }
    format
    id
    relations {
      nodes {
        id
        title {
          english
          native
          romaji
          userPreferred
        }
        type
        format
        isFavourite
      }
    }
  }
}

