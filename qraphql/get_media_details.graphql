query GetMediaDetails($mediaId: Int!, $type: MediaType!, $format: ScoreFormat) {
  Media(id: $mediaId, type: $type) {
    averageScore
    chapters
    coverImage {
      large
    }
    description
    episodes
    mediaListEntry {
      mediaId
      progress
      progressVolumes
      repeat
      status
      score(format: $format)
      startedAt {
        year
        month
        day
      }
      completedAt {
        year
        month
        day
      }
      notes
    }
    season
    seasonYear
    siteUrl
    status
    title {
        romaji
        userPreferred
        english
        native
    }
    type
    volumes
    endDate {
      year
      month
      day
    }
    isFavourite
    startDate {
      year
      month
      day
    }
    format
  }
}
